<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北轉運站交通達人挑戰賽</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .game-container {
            background-color: white;
            max-width: 650px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden; /* 確保圖片圓角外觀一致 */
        }
        /* 新增：頂部橫幅圖片樣式 */
        .banner-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 25px;
            display: block;
        }
        h1 {
            color: #1e3d59;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .question-block {
            background-color: #ffffff;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .option-label {
            display: block;
            position: relative;
            padding: 12px 15px 12px 40px;
            background-color: #f7f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .option-label:hover {
            background-color: #e8f4fd;
            border-color: #3b82f6;
        }
        .option-label input {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
        }
        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .feedback.correct {
            display: block;
            background-color: #d4edda;
            color: #155724;
        }
        .feedback.wrong {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
        }
        .submit-btn, .restart-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #1e3d59;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #17b978;
        }
        .result-screen {
            display: none;
            text-align: center;
            background-color: #e8f4fd;
            border: 2px dashed #3b82f6;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .score-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #1e3d59;
            margin: 15px 0;
        }
        .restart-btn {
            background-color: #17b978;
            margin-top: 15px;
        }
        .restart-btn:hover {
            background-color: #139661;
        }
    </style>
</head>
<body>

<div class="game-container">
    <img src="https://i.meee.com.tw/oQf89HN.jpg" alt="台北轉運站交通指南" class="banner-img">

    <h1>台北轉運站交通達人挑戰賽</h1>
    <div class="subtitle">測測看你對交九與周邊轉乘有多了解！</div>
    
    <div class="result-screen" id="result-screen">
        <h2>🎉 挑戰完成！</h2>
        <div>您的交通達人指數：</div>
        <div class="score-display" id="score-display">0分</div>
        <p id="result-desc" style="font-size: 1.1rem; color: #444; font-weight: bold;"></p>
        <button class="restart-btn" onclick="restartGame()">重新挑戰</button>
    </div>

    <form id="quiz-form" onsubmit="event.preventDefault(); submitQuiz();">
        <div id="quiz-area"></div>
        <button type="submit" class="submit-btn" id="submit-btn">送出答案看成果</button>
    </form>
</div>

<script>
    const quizData = [
        {
            question: "1. 台北轉運站（交九）內部，主要提供前往哪些地方的國道客運？",
            options: ["基隆與雙北市區", "桃園以南、宜蘭等地", "花蓮與台東地區", "僅限桃園機場接駁"],
            correct: 1,
            info: "交九主要提供中南部及國道5號的客運服務。"
        },
        {
            question: "2. 如果你想搭乘「葛瑪蘭客運」前往宜蘭、羅東或礁溪，你應該在何處購票搭乘？",
            options: ["台北車站忠孝站牌", "承德路路邊", "台北轉運站站體內部", "捷運北門站外"],
            correct: 2,
            info: "葛瑪蘭客運是進駐轉運站內部的9家業者之一。"
        },
        {
            question: "3. 朋友想要搭客運去「南投」或「屏東」，根據進駐業者的路線，推薦哪一家客運最合適？",
            options: ["葛瑪蘭客運", "新竹客運", "國光客運", "豪泰客運"],
            correct: 2,
            info: "國光客運在站內提供往返台中、南投、嘉義、台南、高雄、屏東等地的路線。"
        },
        {
            question: "4. 如果要轉乘市區公車「304承德」或「63」路，應該前往哪一個周邊站牌搭乘？",
            options: ["台北車站（承德）", "台北車站（鄭州）", "台北車站（忠孝）", "台北車站（青島）"],
            correct: 0,
            info: "304承德、63、660等線均在此站牌搭乘。"
        },
        {
            question: "5. 關於台北轉運站與「軌道運輸」的連通性，以下敘述何者正確？",
            options: [
                "必須走到戶外馬路才能轉乘捷運",
                "站內直接與台北車站主體建築群連通，可直接步行至捷運、高鐵、台鐵",
                "目前只能連通機場捷運，無法走到高鐵",
                "轉乘台鐵必須先搭乘市區公車"
            ],
            correct: 1,
            info: "台北轉運站與台北車站主體大樓相連，地下通道可直達捷運、高鐵及台鐵。"
        }
    ];

    const quizArea = document.getElementById('quiz-area');
    const resultScreen = document.getElementById('result-screen');
    const scoreDisplay = document.getElementById('score-display');
    const resultDesc = document.getElementById('result-desc');
    const submitBtn = document.getElementById('submit-btn');

    function renderQuiz() {
        quizArea.innerHTML = '';
        quizData.forEach((data, qIndex) => {
            const block = document.createElement('div');
            block.className = 'question-block';

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = data.question;
            block.appendChild(qText);

            data.options.forEach((option, oIndex) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = `label-${qIndex}-${oIndex}`;

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `question-${qIndex}`;
                radio.value = oIndex;
                radio.required = true;

                label.appendChild(radio);
                label.appendChild(document.createTextNode(option));
                block.appendChild(label);
            });

            const feedback = document.createElement('div');
            feedback.id = `feedback-${qIndex}`;
            feedback.className = 'feedback';
            block.appendChild(feedback);

            quizArea.appendChild(block);
        });
    }

    function submitQuiz() {
        let score = 0;

        quizData.forEach((data, qIndex) => {
            const selectedRadio = document.querySelector(`input[name="question-${qIndex}"]:checked`);
            const selectedIndex = parseInt(selectedRadio.value);
            const feedback = document.getElementById(`feedback-${qIndex}`);
            
            const radios = document.querySelectorAll(`input[name="question-${qIndex}"]`);
            radios.forEach(r => r.disabled = true);

            if (selectedIndex === data.correct) {
                score += 20;
                document.getElementById(`label-${qIndex}-${selectedIndex}`).style.backgroundColor = '#d4edda';
                document.getElementById(`label-${qIndex}-${selectedIndex}`).style.borderColor = '#28a745';
                feedback.innerText = `⭕ 答對了！\n解析：${data.info}`;
                feedback.className = "feedback correct";
            } else {
                document.getElementById(`label-${qIndex}-${selectedIndex}`).style.backgroundColor = '#f8d7da';
                document.getElementById(`label-${qIndex}-${selectedIndex}`).style.borderColor = '#dc3545';
                document.getElementById(`label-${qIndex}-${data.correct}`).style.backgroundColor = '#d4edda';
                document.getElementById(`label-${qIndex}-${data.correct}`).style.borderColor = '#28a745';
                feedback.innerText = `❌ 答錯囉！正確答案是【${data.options[data.correct]}】\n解析：${data.info}`;
                feedback.className = "feedback wrong";
            }
        });

        resultScreen.style.display = 'block';
        scoreDisplay.innerText = `${score} 分`;
        
        let desc = "";
        if (score === 100) desc = "太厲害了！你根本是台北轉運站的活地圖，閉著眼睛都不會迷路！";
        else if (score >= 60) desc = "非常不錯！你對轉運站與周邊公車有很好的概念，出行絕對沒問題。";
        else desc = "別擔心！台北車站周邊的確像個大迷宮，多看幾次指南包你下次變達人！";
        
        resultDesc.innerText = desc;
        submitBtn.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function restartGame() {
        resultScreen.style.display = 'none';
        submitBtn.style.display = 'block';
        renderQuiz();
    }

    renderQuiz();
</script>

</body>
</html>
